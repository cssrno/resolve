<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Conflict Merge — Bezier Demo</title>
<style>
  :root {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --border: #2a2a2a;
    --header: #252526;
    --btn-bg: rgba(40,40,40,.9);
    --btn-bg-hover: #0e639c;

    /* IntelliJ-style change colors */
    --add-fill:    rgba(60, 200, 100, 0.18);   /* green   — additions */
    --add-stroke:  rgba(60, 200, 100, 0.55);
    --mod-fill:    rgba(80, 150, 240, 0.18);   /* blue    — modifications */
    --mod-stroke:  rgba(80, 150, 240, 0.55);
    --del-fill:    rgba(160, 160, 160, 0.10);  /* gray    — deletions */
    --del-stroke:  rgba(160, 160, 160, 0.45);
    --conflict-fill:   rgba(230, 80, 80, 0.18); /* red    — direct conflict */
    --conflict-stroke: rgba(230, 80, 80, 0.60);

    --result-resolved-fill: rgba(120, 200, 120, 0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }

  #toolbar { display:flex; gap:8px; padding:8px 12px; background: var(--header);
    border-bottom: 1px solid var(--border); align-items: center; }
  #toolbar button { background: var(--btn-bg-hover); color: white; border:0; padding:5px 12px;
    border-radius: 3px; cursor: pointer; font-size: 12px; }
  #toolbar button:hover { background: #1177bb; }
  #toolbar .spacer { flex:1; }
  #toolbar .legend { display:flex; gap:12px; font-size: 11px; opacity: 0.85; align-items: center; }
  .swatch { display: inline-block; width:10px; height:10px; border-radius:2px; vertical-align: middle; margin-right:4px; }
  .swatch.add { background: var(--add-fill); border: 1px solid var(--add-stroke); }
  .swatch.mod { background: var(--mod-fill); border: 1px solid var(--mod-stroke); }
  .swatch.del { background: var(--del-fill); border: 1px dashed var(--del-stroke); }
  .swatch.conf { background: var(--conflict-fill); border: 1px solid var(--conflict-stroke); }

  /* Left gutter zone: [30 empty][30 actions][18 ln-local][30 bezier][18 ln-result-l][60 empty]
     Right gutter zone (mirrored): [60 empty][18 ln-result-r][30 bezier][18 ln-remote][30 actions][30 empty] */
  #app { position: relative; display: grid;
    grid-template-columns: 1fr 30px 30px 18px 30px 18px 60px 1fr 60px 18px 30px 18px 30px 30px 1fr;
    height: calc(100% - 41px); overflow: hidden; }

  /* All scrollable cells use transform-based scroll for atomic GPU paint (no per-column lag) */
  .pane, .ln-col, .spacer, .actions-col {
    position: relative; overflow: hidden; background: var(--bg); }
  .pane.gutter { overflow: hidden; background: var(--bg); }
  .pane .content, .ln-col .ln-content, .spacer .ln-content, .actions-col .ln-content {
    position: relative; will-change: transform;
    transform: translate3d(0, 0, 0); z-index: 1; }

  .pane .content { min-width: max-content; }
  .spacer .ln-row, .actions-col .ln-row { color: transparent; }
  .ln-row { line-height: 18px; text-align: right; padding-right: 4px;
    font-size: 10px; user-select: none; color: rgba(180,180,180,0.5);
    font-family: 'SF Mono', Menlo, Consolas, monospace; }
  .ln-row.add             { background: var(--add-fill); }
  .ln-row.mod             { background: var(--mod-fill); }
  .ln-row.del             { background: var(--del-fill); }
  .ln-row.conflict        { background: var(--conflict-fill); }
  .ln-row.result-resolved   { background: var(--result-resolved-fill); }
  .ln-row.result-unresolved { background: var(--conflict-fill); }

  /* Per-row separator at the boundary between each code column and the gutter band.
     1px gray on empty rows; 2px lighter-tint of zone color on colored rows. */
  #space-l1 .ln-row, #space-l2 .ln-row,
  #space-r1 .ln-row, #space-r2 .ln-row { position: relative; }
  #space-l1 .ln-row::after, #space-r1 .ln-row::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 1px; background: rgba(160, 160, 160, 0.25); pointer-events: none;
  }
  #space-l2 .ln-row::after, #space-r2 .ln-row::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0;
    width: 1px; background: rgba(160, 160, 160, 0.25); pointer-events: none;
  }
  #space-l1 .ln-row.add::after, #space-l2 .ln-row.add::after,
  #space-r1 .ln-row.add::after, #space-r2 .ln-row.add::after {
    width: 2px; background: rgba(85, 200, 120, 0.42);
  }
  #space-l1 .ln-row.mod::after, #space-l2 .ln-row.mod::after,
  #space-r1 .ln-row.mod::after, #space-r2 .ln-row.mod::after {
    width: 2px; background: rgba(100, 165, 235, 0.42);
  }
  #space-l1 .ln-row.del::after, #space-l2 .ln-row.del::after,
  #space-r1 .ln-row.del::after, #space-r2 .ln-row.del::after {
    width: 2px; background: rgba(170, 170, 170, 0.32);
  }
  #space-l1 .ln-row.conflict::after, #space-l2 .ln-row.conflict::after,
  #space-r1 .ln-row.conflict::after, #space-r2 .ln-row.conflict::after,
  #space-l1 .ln-row.result-unresolved::after, #space-l2 .ln-row.result-unresolved::after,
  #space-r1 .ln-row.result-unresolved::after, #space-r2 .ln-row.result-unresolved::after {
    width: 2px; background: rgba(225, 95, 95, 0.42);
  }
  #space-l1 .ln-row.result-resolved::after, #space-l2 .ln-row.result-resolved::after,
  #space-r1 .ln-row.result-resolved::after, #space-r2 .ln-row.result-resolved::after {
    width: 2px; background: rgba(125, 200, 125, 0.40);
  }
  .pane-header { position: relative; height: 30px; padding: 0 12px; font-weight:bold;
    font-size:11px; text-transform: uppercase; opacity:.75;
    background: var(--header); border-bottom:1px solid var(--border); z-index:2;
    white-space: nowrap; display: flex; gap: 8px; align-items: center;
    box-sizing: border-box; flex-shrink: 0; }
  .pane-header .branch { font-weight: normal; opacity: 0.6; font-size: 10px; }
  .gutter .pane-header { padding: 6px 4px; text-align:center; opacity:.4; font-size:9px; justify-content: center; }

  .pane > .content { min-width: max-content; }
  .hunk { min-width: 100%; }
  .line { display:flex; white-space:pre; height:18px; padding:0 8px;
    line-height:18px; min-width: 100%; }
  .line.pad { opacity: 0; pointer-events: none; }
  .line.deleted { opacity: 0.45; text-decoration: line-through; font-style: italic; }

  .hunk { position:relative; }
  .hunk.add       { background: var(--add-fill); }
  .hunk.mod       { background: var(--mod-fill); }
  .hunk.del       { background: var(--del-fill); border-top: 1px dashed var(--del-stroke);
                    border-bottom: 1px dashed var(--del-stroke); }
  .hunk.conflict  { background: var(--conflict-fill); }
  /* Result hunk: only colored by the change type (consistent across panes).
     Conflict zone is the only case that gets its own (red) color. */
  .hunk.result-auto       { background: transparent; }
  .hunk.result-auto.add   { background: var(--add-fill); }
  .hunk.result-auto.mod   { background: var(--mod-fill); }
  .hunk.result-auto.del   { background: var(--del-fill); }
  .hunk.result-unresolved { background: var(--conflict-fill); }
  .hunk.result-resolved   { background: var(--result-resolved-fill); }

  /* Insertion-point marker: occupies only 2px of vertical space (a thin colored
     bar between context lines). No empty row reserved on the empty side. */
  .hunk.insertion-marker { height: 2px; overflow: hidden;
    background: var(--marker-color) !important; pointer-events: none; }
  .hunk.insertion-marker.add  { --marker-color: var(--add-fill); }
  .hunk.insertion-marker.mod  { --marker-color: var(--mod-fill); }
  .hunk.insertion-marker.del  { --marker-color: var(--del-fill); }
  .hunk.insertion-marker.result-unresolved { --marker-color: var(--conflict-fill); }

  .pipes { position:absolute; top: 30px; left: 0; width: 100%;
    height: calc(100% - 30px); pointer-events:none; z-index:1; }
  .pipes path { pointer-events: fill; cursor: pointer; }

  /* Action group: 2 icons side-by-side, no chrome */
  .zone-actions { position:absolute; pointer-events:auto; display:flex;
    flex-direction: row; gap: 2px; z-index: 10; }
  .icon-btn { background: transparent; color: rgba(220,220,220,0.7); border: 0;
    width: 13px; height: 14px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center; }
  .icon-btn:hover { color: #fff; }
  .icon-btn svg { width: 11px; height: 11px; display:block; }
</style>
</head>
<body>
<div id="toolbar">
  <button onclick="acceptAll('left')">Accept all left</button>
  <button onclick="acceptAll('right')">Accept all right</button>
  <button onclick="resetAll()">Reset</button>
  <div class="spacer"></div>
  <div class="legend">
    <span><span class="swatch add"></span>Ajout</span>
    <span><span class="swatch mod"></span>Modification</span>
    <span><span class="swatch del"></span>Suppression</span>
    <span><span class="swatch conf"></span>Conflit</span>
  </div>
  <div class="spacer"></div>
  <span class="status" id="status">— / —</span>
</div>
<div id="app">
  <div class="pane" id="pane-local">
    <div class="pane-header">Local <span class="branch">· feature/oauth</span></div>
    <div class="content"></div>
  </div>
  <div class="spacer" id="space-l1"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="actions-col" id="actions-left"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="ln-col" id="ln-local"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="pane gutter" id="gutter-left">
    <div class="pane-header"></div>
    <svg class="pipes" id="pipes-left"></svg>
  </div>
  <div class="ln-col" id="ln-result-l"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="spacer" id="space-l2"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="pane" id="pane-result">
    <div class="pane-header">Result <span class="branch">· UserService.ts</span></div>
    <div class="content"></div>
  </div>
  <div class="spacer" id="space-r1"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="ln-col" id="ln-result-r"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="pane gutter" id="gutter-right">
    <div class="pane-header"></div>
    <svg class="pipes" id="pipes-right"></svg>
  </div>
  <div class="ln-col" id="ln-remote"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="actions-col" id="actions-right"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="spacer" id="space-r2"><div class="pane-header"></div><div class="ln-content"></div></div>
  <div class="pane" id="pane-remote">
    <div class="pane-header">Remote <span class="branch">· origin/main</span></div>
    <div class="content"></div>
  </div>
</div>

<script>
/* ============================================
   Section kinds:
     - ctx        : identical in all 3 panes
     - addLocal   : lines added on left only (green)
     - addRemote  : lines added on right only (green)
     - modLocal   : line in base modified on left only (blue)
     - modRemote  : line in base modified on right only (blue)
     - delLocal   : lines in base removed on left only (gray dashed)
     - delRemote  : lines in base removed on right only (gray dashed)
     - conflict   : both sides modified same region (red)
   ============================================ */
const SECTIONS = [
  { kind: 'ctx', lines: [
    "import { Injectable } from '@nestjs/common';",
    "import { Repository } from 'typeorm';",
  ]},

  { kind: 'addRemote', id: 'r1',
    remote: ["import { Logger } from './logger';"] },

  { kind: 'conflict', id: 'c1',
    local:  [
      "import { OAuthProvider } from './oauth/provider';",
      "import { TokenStore } from './oauth/token-store';",
    ],
    remote: ["import { MetricsCollector } from './metrics';"] },

  { kind: 'ctx', lines: [
    "import { User } from './user.entity';",
    "",
  ]},

  /* Simple one-line addition on local */
  { kind: 'addLocal', id: 'l0',
    local: ["// TODO: enforce rate-limit on login endpoints"] },

  { kind: 'ctx', lines: [
    "@Injectable()",
    "export class UserService {",
    "  constructor(",
    "    private readonly repo: Repository<User>,",
  ]},

  { kind: 'addLocal', id: 'l1',
    local: [
      "    private readonly oauth: OAuthProvider,",
      "    private readonly tokens: TokenStore,",
    ]},

  { kind: 'ctx', lines: [
    "  ) {}",
    "",
    "  async findById(id: string): Promise<User | null> {",
  ]},

  /* Modification: base existed, local changed query */
  { kind: 'modLocal', id: 'm1',
    base:  ["    return this.repo.findOne({ where: { id } });"],
    local: ["    return this.repo.findOne({ where: { id }, relations: ['profile'] });"] },

  { kind: 'ctx', lines: [
    "  }",
    "",
    "  async findByEmail(email: string): Promise<User | null> {",
    "    return this.repo.findOne({ where: { email } });",
    "  }",
    "",
    "  async create(input: CreateUserInput): Promise<User> {",
  ]},

  { kind: 'addRemote', id: 'r2',
    remote: [
      "    if (!input.email?.match(/^[^@]+@[^@]+$/)) {",
      "      throw new Error('invalid email');",
      "    }",
    ]},

  { kind: 'ctx', lines: [
    "    const user = this.repo.create(input);",
    "    return this.repo.save(user);",
    "  }",
    "",
  ]},

  /* Deletion: base had legacy method, local removed it */
  { kind: 'delLocal', id: 'd1',
    base: [
      "  /** @deprecated use loginWithOAuth instead */",
      "  async loginLegacy(username: string, password: string): Promise<User> {",
      "    const user = await this.findByEmail(username);",
      "    if (!user || user.password !== hash(password)) {",
      "      throw new UnauthorizedError();",
      "    }",
      "    return user;",
      "  }",
      "",
    ]},

  { kind: 'addLocal', id: 'l2',
    local: [
      "  async loginWithOAuth(code: string): Promise<User> {",
      "    const profile = await this.oauth.exchange(code);",
      "    let user = await this.findByEmail(profile.email);",
      "    if (!user) {",
      "      user = await this.create({ email: profile.email, name: profile.name });",
      "    }",
      "    await this.tokens.issue(user.id);",
      "    return user;",
      "  }",
      "",
    ]},

  /* Modification: remote changed cache TTL */
  { kind: 'modRemote', id: 'm2',
    base:   ["  private static readonly CACHE_TTL = 60;"],
    remote: ["  private static readonly CACHE_TTL = 300;"] },

  { kind: 'ctx', lines: [
    "",
  ]},

  { kind: 'conflict', id: 'c3',
    local:  [
      "  async delete(id: string, reason: string): Promise<void> {",
      "    await this.tokens.revokeAll(id);",
      "    await this.repo.softDelete(id);",
    ],
    remote: [
      "  async delete(id: string): Promise<boolean> {",
      "    const r = await this.repo.delete(id);",
      "    return r.affected > 0;",
    ]},

  /* Deletion on remote: removed verbose comment */
  { kind: 'delRemote', id: 'd2',
    base: [
      "  /**",
      "   * Final cleanup hook.",
      "   * Called by NestJS lifecycle.",
      "   */",
    ]},

  { kind: 'ctx', lines: [
    "  }",
    "",
    "  async updateProfile(id: string, patch: Partial<User>): Promise<User> {",
    "    const user = await this.findById(id);",
    "    if (!user) throw new NotFoundError('user not found');",
    "    Object.assign(user, patch);",
    "    return this.repo.save(user);",
    "  }",
    "",
    "  async listAll(filter?: UserFilter): Promise<User[]> {",
    "    const query = this.repo.createQueryBuilder('user');",
    "    if (filter?.email) query.andWhere('user.email LIKE :e', { e: `%${filter.email}%` });",
    "    if (filter?.role)  query.andWhere('user.role = :r',     { r: filter.role });",
  ]},

  /* Bigger conflict on pagination */
  { kind: 'conflict', id: 'c4',
    local: [
      "    if (filter?.cursor) {",
      "      query.andWhere('user.id > :c', { c: filter.cursor });",
      "      query.orderBy('user.id', 'ASC');",
      "      query.take(filter.limit ?? 50);",
      "    }",
    ],
    remote: [
      "    if (filter?.page) {",
      "      const size = filter.size ?? 25;",
      "      query.skip((filter.page - 1) * size);",
      "      query.take(size);",
      "    }",
    ]},

  { kind: 'ctx', lines: [
    "    return query.getMany();",
    "  }",
    "",
    "  async countByRole(): Promise<Record<string, number>> {",
    "    const rows = await this.repo",
    "      .createQueryBuilder('u')",
    "      .select('u.role', 'role')",
    "      .addSelect('COUNT(*)', 'count')",
    "      .groupBy('u.role')",
    "      .getRawMany();",
    "    return Object.fromEntries(rows.map(r => [r.role, +r.count]));",
    "  }",
    "",
  ]},

  /* Remote-only addition: telemetry hook */
  { kind: 'addRemote', id: 'r3',
    remote: [
      "  @OnEvent('user.created')",
      "  async onCreated(user: User): Promise<void> {",
      "    this.metrics.recordSignup(user.id);",
      "    this.logger.info('user created', { id: user.id });",
      "  }",
      "",
    ]},

  /* Local-only addition: token rotation cron */
  { kind: 'addLocal', id: 'l3',
    local: [
      "  @Cron('0 */6 * * *')",
      "  async rotateTokens(): Promise<void> {",
      "    const users = await this.repo.find({ where: { active: true } });",
      "    await Promise.all(users.map(u => this.tokens.rotate(u.id)));",
      "  }",
      "",
    ]},

  /* Mod on both — different default page size constants */
  { kind: 'conflict', id: 'c5',
    local:  ["  private static readonly DEFAULT_LIMIT = 50;"],
    remote: ["  private static readonly DEFAULT_PAGE_SIZE = 25;"] },

  { kind: 'ctx', lines: [
    "  private buildFilters(input: any): UserFilter {",
    "    return {",
    "      email: input.email?.trim().toLowerCase(),",
    "      role:  input.role,",
    "    };",
    "  }",
    "}",
  ]},
];

const state = { resolutions: {}, skipped: {}, hunks: [] };
function initState() {
  for (const s of SECTIONS) {
    if (s.kind === 'conflict') state.resolutions[s.id] = null;
    else if (s.kind !== 'ctx') state.skipped[s.id] = true; // not applied by default
  }
}
initState();

/* ============================================
   Map each section to a normalized "zone":
     - leftLines, leftCls
     - rightLines, rightCls
     - resultLines, resultCls
     - kind: conflict | auto
     - changeSide: 'left' | 'right' | 'both'  (which gutter shows pipe)
     - changeType: 'add' | 'mod' | 'del' | 'conflict'
   ============================================ */
function describe(sec) {
  // result hunk only gets the change-type color when the change is APPLIED.
  // When skipped, result shows base content unhighlighted (or a marker if no base).
  switch (sec.kind) {
    case 'addLocal': {
      const applied = !state.skipped[sec.id];
      return {
        left:  { lines: sec.local, cls: 'add' },
        right: { lines: [], cls: 'add' },
        result: { lines: applied ? sec.local : [], cls: 'result-auto' + (applied ? ' add' : ' add') },
        kind: 'auto', changeSide: 'left', changeType: 'add',
      };
    }
    case 'addRemote': {
      const applied = !state.skipped[sec.id];
      return {
        left:  { lines: [], cls: 'add' },
        right: { lines: sec.remote, cls: 'add' },
        result: { lines: applied ? sec.remote : [], cls: 'result-auto' + (applied ? ' add' : ' add') },
        kind: 'auto', changeSide: 'right', changeType: 'add',
      };
    }
    case 'modLocal': {
      const applied = !state.skipped[sec.id];
      return {
        left:  { lines: sec.local, cls: 'mod' },
        right: { lines: sec.base, cls: '' },
        result: { lines: applied ? sec.local : sec.base, cls: 'result-auto' + (applied ? ' mod' : '') },
        kind: 'auto', changeSide: 'left', changeType: 'mod',
      };
    }
    case 'modRemote': {
      const applied = !state.skipped[sec.id];
      return {
        left:  { lines: sec.base, cls: '' },
        right: { lines: sec.remote, cls: 'mod' },
        result: { lines: applied ? sec.remote : sec.base, cls: 'result-auto' + (applied ? ' mod' : '') },
        kind: 'auto', changeSide: 'right', changeType: 'mod',
      };
    }
    case 'delLocal': {
      const applied = !state.skipped[sec.id];
      return {
        left:  { lines: [], cls: 'del' },
        right: { lines: sec.base, cls: 'del', deleted: true },
        result: { lines: applied ? [] : sec.base, cls: 'result-auto' + (applied ? ' del' : '') },
        kind: 'auto', changeSide: 'left', changeType: 'del',
      };
    }
    case 'delRemote': {
      const applied = !state.skipped[sec.id];
      return {
        left:  { lines: sec.base, cls: 'del', deleted: true },
        right: { lines: [], cls: 'del' },
        result: { lines: applied ? [] : sec.base, cls: 'result-auto' + (applied ? ' del' : '') },
        kind: 'auto', changeSide: 'right', changeType: 'del',
      };
    }
    case 'conflict': {
      const r = state.resolutions[sec.id];
      return {
        left:  { lines: sec.local, cls: 'conflict' },
        right: { lines: sec.remote, cls: 'conflict' },
        result: { lines: resolutionLines(sec, r), cls: r ? 'result-resolved' : 'result-unresolved' },
        kind: 'conflict', changeSide: 'both', changeType: 'conflict',
      };
    }
  }
}

function resolutionLines(sec, r) {
  if (!r) return [];
  if (r === 'left')  return sec.local;
  if (r === 'right') return sec.remote;
  if (r === 'both')  return [...sec.local, ...sec.remote];
  return [];
}

/* ============================================ */
function render() {
  const local  = mountPane('pane-local');
  const result = mountPane('pane-result');
  const remote = mountPane('pane-remote');
  const hunks = [];
  const ln = { local: 0, result: 0, remote: 0 };
  const sections = [];
  let virtualY = 0;
  const paneY = { local: 0, result: 0, remote: 0 };

  function pushSection(localH, resultH, remoteH) {
    const virtualH = Math.max(localH, resultH, remoteH);
    sections.push({
      virtualStart: virtualY,
      virtualHeight: virtualH,
      paneStarts: { local: paneY.local, result: paneY.result, remote: paneY.remote },
      paneHeights: { local: localH, result: resultH, remote: remoteH },
    });
    virtualY += virtualH;
    paneY.local += localH;
    paneY.result += resultH;
    paneY.remote += remoteH;
  }

  function heightOf(lines, isMarker) {
    if (isMarker) return 2;
    return lines.length * 18;
  }

  for (const sec of SECTIONS) {
    if (sec.kind === 'ctx') {
      for (const text of sec.lines) {
        ln.local++; ln.result++; ln.remote++;
        local.appendChild(makeLine(text, ln.local));
        result.appendChild(makeLine(text, ln.result));
        remote.appendChild(makeLine(text, ln.remote));
      }
      const h = sec.lines.length * 18;
      pushSection(h, h, h);
      continue;
    }

    const z = describe(sec);
    const isUnresolved = z.kind === 'conflict' && z.result.lines.length === 0;

    const leftMarker  = z.left.lines.length === 0;
    const rightMarker = z.right.lines.length === 0;

    const lh = buildHunk(z.left.cls, z.left.lines, ln.local, z.left.deleted);
    if (sec.id) lh.dataset.blockId = sec.id;
    ln.local += z.left.deleted ? 0 : z.left.lines.length;
    local.appendChild(lh);

    let resHunk;
    let resultH;
    if (isUnresolved) {
      const rows = Math.max(z.left.lines.length, z.right.lines.length, 1);
      resHunk = document.createElement('div');
      resHunk.className = 'hunk ' + z.result.cls;
      for (let i = 0; i < rows; i++) {
        const p = makeLine(' ', null);
        p.classList.add('pad');
        resHunk.appendChild(p);
      }
      resultH = rows * 18;
    } else {
      resHunk = buildHunk(z.result.cls, z.result.lines, ln.result, false);
      resultH = heightOf(z.result.lines, z.result.lines.length === 0);
    }
    if (z.kind === 'conflict') {
      resHunk.contentEditable = 'plaintext-only';
      resHunk.spellcheck = false;
    }
    if (sec.id) resHunk.dataset.blockId = sec.id;
    ln.result += z.result.lines.length;
    result.appendChild(resHunk);

    const rh = buildHunk(z.right.cls, z.right.lines, ln.remote, z.right.deleted);
    if (sec.id) rh.dataset.blockId = sec.id;
    ln.remote += z.right.deleted ? 0 : z.right.lines.length;
    remote.appendChild(rh);

    const localH  = heightOf(z.left.lines,  leftMarker);
    const remoteH = heightOf(z.right.lines, rightMarker);
    pushSection(localH, resultH, remoteH);

    hunks.push({
      id: sec.id, kind: z.kind, changeSide: z.changeSide, changeType: z.changeType,
      local: lh, result: resHunk, remote: rh,
    });
  }

  state.hunks = hunks;
  state.sections = sections;
  state.virtualHeight = virtualY;
  renderLineNumbers();
  schedulePipes();
}

function renderLineNumbers() {
  const map = {
    'pane-local':  ['space-l1', 'actions-left', 'ln-local'],
    'pane-result': ['ln-result-l', 'space-l2', 'space-r1', 'ln-result-r'],
    'pane-remote': ['ln-remote', 'actions-right', 'space-r2'],
  };
  for (const [paneId, colIds] of Object.entries(map)) {
    const pane = document.querySelector('#' + paneId + ' .content');
    const cols = colIds.map(id => {
      const el = document.querySelector('#' + id + ' .ln-content');
      el.innerHTML = '';
      return el;
    });
    let lineNum = 0;
    for (const child of pane.children) {
      if (child.classList.contains('line')) {
        lineNum++;
        emitLn(cols, lineNum, 18, '', null);
      } else if (child.classList.contains('hunk')) {
        const cls = hunkColorClass(child);
        const blockId = child.dataset.blockId || null;
        if (child.classList.contains('insertion-marker')) {
          emitLn(cols, null, 2, cls, blockId);
        } else {
          let first = true;
          for (const inner of child.children) {
            if (!inner.classList.contains('line')) continue;
            const tag = first ? blockId : null;
            first = false;
            if (inner.classList.contains('pad') || inner.classList.contains('deleted')) {
              emitLn(cols, null, 18, cls, tag);
            } else {
              lineNum++;
              emitLn(cols, lineNum, 18, cls, tag);
            }
          }
        }
      }
    }
  }
}

function hunkColorClass(hunkEl) {
  for (const c of ['add', 'mod', 'del', 'conflict',
                   'result-resolved', 'result-unresolved', 'result-auto']) {
    if (hunkEl.classList.contains(c)) return c;
  }
  return '';
}

function emitLn(cols, num, heightPx, colorCls, blockId) {
  for (const el of cols) {
    const row = document.createElement('div');
    row.className = 'ln-row' + (colorCls ? ' ' + colorCls : '');
    row.style.height = heightPx + 'px';
    row.textContent = num === null ? '' : String(num);
    if (blockId) row.dataset.blockId = blockId;
    el.appendChild(row);
  }
}

function buildHunk(cls, lines, startLn, deleted) {
  const el = document.createElement('div');
  el.className = 'hunk' + (cls ? ' ' + cls : '');
  if (lines.length === 0) {
    el.classList.add('insertion-marker');
    const row = makeLine(' ', null);
    row.classList.add('pad');
    el.appendChild(row);
    return el;
  }
  lines.forEach((t, i) => {
    const line = makeLine(t, deleted ? null : startLn + i + 1);
    if (deleted) line.classList.add('deleted');
    el.appendChild(line);
  });
  return el;
}

function appendPad(parent, count) {
  for (let i = 0; i < count; i++) {
    const pad = makeLine(' ', null);
    pad.classList.add('pad');
    parent.appendChild(pad);
  }
}

function mountPane(id) {
  const el = document.querySelector('#' + id + ' .content');
  el.innerHTML = '';
  return el;
}

function makeLine(text, _num) {
  const div = document.createElement('div');
  div.className = 'line';
  const c = document.createElement('span');
  c.textContent = text === '' ? ' ' : text;
  div.append(c);
  return div;
}

/* ============================================
   Pipes — fill colored by change type
   ============================================ */
const FILL = {
  add:      'rgba(60, 200, 100, 0.18)',
  mod:      'rgba(80, 150, 240, 0.18)',
  del:      'rgba(160, 160, 160, 0.10)',
  conflict: 'rgba(230, 80, 80, 0.18)',
};

function schedulePipes() {
  cancelAnimationFrame(state.raf);
  state.raf = requestAnimationFrame(renderPipes);
}

function renderPipes() {
  document.querySelectorAll('.zone-actions').forEach(b => b.remove());
  renderGutter('pipes-left', 'gutter-left', 'left');
  renderGutter('pipes-right', 'gutter-right', 'right');
}

const ICON = {
  chevronRight: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,3 8,8 3,13"/><polyline points="8,3 13,8 8,13"/></svg>',
  chevronLeft:  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13,3 8,8 13,13"/><polyline points="8,3 3,8 8,13"/></svg>',
  cross:        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>',
};

function makeIconBtn(html, title, className, onClick) {
  const b = document.createElement('button');
  b.className = 'icon-btn' + (className ? ' ' + className : '');
  b.innerHTML = html;
  b.title = title;
  b.onclick = (e) => { e.stopPropagation(); onClick(); };
  return b;
}

function renderGutter(svgId, gutterId, edge) {
  const svg = document.getElementById(svgId);
  const gutter = document.getElementById(gutterId);
  const gR = gutter.getBoundingClientRect();
  const headerH = 30;
  const contentTop = gR.top + headerH;
  const contentH = gR.height - headerH;

  svg.innerHTML = '';
  svg.setAttribute('width', gR.width);
  svg.setAttribute('height', contentH);
  svg.setAttribute('viewBox', `0 0 ${gR.width} ${contentH}`);

  for (const h of state.hunks) {
    // skip pipe if change doesn't touch this side
    if (edge === 'left'  && h.changeSide === 'right') continue;
    if (edge === 'right' && h.changeSide === 'left') continue;

    const from = edge === 'left' ? h.local : h.result;
    const to   = edge === 'left' ? h.result : h.remote;
    const fR = from.getBoundingClientRect();
    const tR = to.getBoundingClientRect();

    const sx = 0, ex = gR.width;
    const sy_top = fR.top - contentTop;
    const sy_bot = fR.bottom - contentTop;
    const ey_top = tR.top - contentTop;
    const ey_bot = tR.bottom - contentTop;

    if (Math.max(sy_bot, ey_bot) < 0) continue;
    if (Math.min(sy_top, ey_top) > contentH) continue;

    const fill = FILL[h.changeType];
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d',
      `M ${sx} ${sy_top}
       C ${ex/2} ${sy_top}, ${ex/2} ${ey_top}, ${ex} ${ey_top}
       L ${ex} ${ey_bot}
       C ${ex/2} ${ey_bot}, ${ex/2} ${sy_bot}, ${sx} ${sy_bot} Z`);
    path.setAttribute('fill', fill);
    path.setAttribute('stroke', 'none');
    svg.appendChild(path);

    // Buttons anchored INSIDE the first ln-row (the one carrying data-block-id)
    // of the corresponding actions column. They scroll with the row naturally.
    const actionsId = edge === 'left' ? 'actions-left' : 'actions-right';
    const row = document.querySelector(`#${actionsId} .ln-row[data-block-id="${h.id}"]`);
    if (!row) continue;
    row.style.position = 'relative';
    row.style.overflow = 'visible';

    const wrap = document.createElement('div');
    wrap.className = 'zone-actions';
    wrap.style.left = '50%';
    wrap.style.top  = '50%';
    wrap.style.transform = 'translate(-50%, -50%)';

    let mergeBtn, crossBtn;
    if (h.kind === 'conflict') {
      const mergeIcon = edge === 'left' ? ICON.chevronRight : ICON.chevronLeft;
      const mergeTitle = edge === 'left' ? 'Accept local' : 'Accept remote';
      mergeBtn = makeIconBtn(mergeIcon, mergeTitle, '', () => accept(h.id, edge));
      crossBtn = makeIconBtn(ICON.cross, 'Reject this side', 'danger', () => reject(h.id, edge));
    } else {
      const applied = !state.skipped[h.id];
      const mergeIcon = edge === 'left' ? ICON.chevronRight : ICON.chevronLeft;
      mergeBtn = makeIconBtn(mergeIcon,
        applied ? 'Already applied (click to re-apply)' : 'Apply change',
        '', () => unskip(h.id));
      crossBtn = makeIconBtn(ICON.cross,
        applied ? 'Skip this change' : 'Currently skipped',
        'danger', () => skip(h.id));
    }

    if (edge === 'left') { wrap.appendChild(crossBtn); wrap.appendChild(mergeBtn); }
    else                 { wrap.appendChild(mergeBtn); wrap.appendChild(crossBtn); }

    row.appendChild(wrap);
  }
}

/* ============================================ */
function setupScroll() {
  const paneContents = {
    local:  document.querySelector('#pane-local .content'),
    result: document.querySelector('#pane-result .content'),
    remote: document.querySelector('#pane-remote .content'),
  };
  const mirrorContents = {
    local:  ['space-l1', 'actions-left', 'ln-local']
              .map(id => document.querySelector('#' + id + ' .ln-content')),
    result: ['ln-result-l', 'space-l2', 'space-r1', 'ln-result-r']
              .map(id => document.querySelector('#' + id + ' .ln-content')),
    remote: ['ln-remote', 'actions-right', 'space-r2']
              .map(id => document.querySelector('#' + id + ' .ln-content')),
  };
  const panes = {
    local:  document.getElementById('pane-local'),
    result: document.getElementById('pane-result'),
    remote: document.getElementById('pane-remote'),
  };
  const codePanes = Object.values(panes);
  const app = document.getElementById('app');
  let virtualY = 0;
  let scrollLeft = 0;
  let pending = false;

  function actualYFor(side, vY) {
    const sections = state.sections;
    if (!sections || sections.length === 0) return 0;
    for (const sec of sections) {
      const end = sec.virtualStart + sec.virtualHeight;
      if (vY < end) {
        const delta = vY - sec.virtualStart;
        const paneH = sec.paneHeights[side];
        return sec.paneStarts[side] + Math.min(delta, paneH);
      }
    }
    const last = sections[sections.length - 1];
    return last.paneStarts[side] + last.paneHeights[side];
  }

  function applyScroll(nextVY, nextLeft) {
    const viewportH = panes.local.clientHeight - 30; // minus header
    const maxV = Math.max(0, (state.virtualHeight || 0) - viewportH);
    const maxLeft = Math.max(0, ...codePanes.map(p => {
      const c = p.querySelector('.content');
      return c.scrollWidth - p.clientWidth;
    }));
    virtualY  = Math.max(0, Math.min(maxV, nextVY));
    scrollLeft = Math.max(0, Math.min(maxLeft, nextLeft));
    if (pending) return;
    pending = true;
    requestAnimationFrame(() => {
      pending = false;
      for (const side of ['local', 'result', 'remote']) {
        const aY = actualYFor(side, virtualY);
        paneContents[side].style.transform = `translate3d(${-scrollLeft}px, ${-aY}px, 0)`;
        for (const m of mirrorContents[side]) {
          m.style.transform = `translate3d(0, ${-aY}px, 0)`;
        }
      }
      renderPipes();
    });
  }

  // capture phase + preventDefault: intercept wheel BEFORE any element scrolls natively
  app.addEventListener('wheel', (e) => {
    e.preventDefault();
    e.stopPropagation();
    applyScroll(virtualY + e.deltaY, scrollLeft + e.deltaX);
  }, { passive: false, capture: true });

  // keyboard scrolling support
  window.addEventListener('keydown', (e) => {
    const step = 18;
    if (e.key === 'ArrowDown') applyScroll(virtualY + step, scrollLeft);
    else if (e.key === 'ArrowUp') applyScroll(virtualY - step, scrollLeft);
    else if (e.key === 'PageDown') applyScroll(virtualY + codePanes[0].clientHeight * 0.9, scrollLeft);
    else if (e.key === 'PageUp') applyScroll(virtualY - codePanes[0].clientHeight * 0.9, scrollLeft);
    else if (e.key === 'Home') applyScroll(0, 0);
    else if (e.key === 'End') applyScroll(1e9, scrollLeft);
    else return;
    e.preventDefault();
  });
}

function accept(blockId, side) { state.resolutions[blockId] = side; render(); updateStatus(); }
function reject(blockId, edge) {
  state.resolutions[blockId] = edge === 'left' ? 'right' : 'left';
  render(); updateStatus();
}
function skip(blockId)   { state.skipped[blockId] = true;  render(); updateStatus(); }
function unskip(blockId) { state.skipped[blockId] = false; render(); updateStatus(); }
function acceptAll(side) { Object.keys(state.resolutions).forEach(k => state.resolutions[k] = side); render(); updateStatus(); }
function resetAll() {
  Object.keys(state.resolutions).forEach(k => state.resolutions[k] = null);
  Object.keys(state.skipped).forEach(k => state.skipped[k] = false);
  render(); updateStatus();
}
function updateStatus() {
  const total = Object.keys(state.resolutions).length;
  const resolved = Object.values(state.resolutions).filter(Boolean).length;
  const auto = Object.keys(state.skipped).length;
  document.getElementById('status').textContent =
    `${resolved}/${total} conflits · ${auto} changements auto`;
}

window.addEventListener('resize', schedulePipes);
setupScroll();
render();
updateStatus();
</script>
